name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug"]

body:

* type: markdown
  attributes:
  value: |
  Thanks for reporting a bug.

* type: input
  id: summary
  attributes:
  label: Bug Summary
  placeholder: Briefly describe the bug
  validations:
  required: true

* type: textarea
  id: steps
  attributes:
  label: Steps to Reproduce
  placeholder: |
  1. Go to...
  2. Click...
  3. See error...
  validations:
  required: true

* type: textarea
  id: expected
  attributes:
  label: Expected Behavior
  validations:
  required: true

* type: textarea
  id: actual
  attributes:
  label: Actual Behavior
  validations:
  required: true

* type: input
  id: browser
  attributes:
  label: Browser/Environment
  placeholder: Chrome, Firefox, Windows, Linux, etc.
