<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Coding Room Simulator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global Theme CSS -->
    <link rel="stylesheet" href="../global-theme.css">
    <!-- Custom App CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="topbar">
        <div class="logo">
            <i class="fas fa-laptop-code"></i>
            <h1>Coding Room Simulator</h1>
        </div>
        <div class="topbar-actions">
            <div class="timer-display" id="timer-display">
                <i class="fas fa-clock"></i> <span>30:00</span>
            </div>
            <button class="theme-toggle" onclick="window.toggleGlobalTheme()" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="app-container">
        
        <!-- Left Pane: AI Interviewer -->
        <aside class="interviewer-pane">
            <div class="pane-header">
                <h2><i class="fas fa-robot"></i> AI Interviewer</h2>
                <select id="prompt-select" class="prompt-select">
                    <option value="reverse">Reverse a String</option>
                    <option value="twosum">Two Sum</option>
                    <option value="palindrome">Valid Palindrome</option>
                </select>
            </div>
            
            <div class="chat-container" id="chat-container">
                <!-- Chat messages will be injected here -->
            </div>
        </aside>

        <!-- Right Pane: Editor & Console -->
        <main class="workspace-pane">
            
            <!-- Code Editor Area -->
            <div class="editor-section">
                <div class="pane-header">
                    <h2><i class="fas fa-code"></i> workspace.js</h2>
                    <button id="btn-run" class="btn-run"><i class="fas fa-play"></i> Run Code</button>
                </div>
                <div class="editor-container">
                    <div class="line-numbers" id="line-numbers">1</div>
                    <textarea id="code-editor" class="code-editor" spellcheck="false" placeholder="Write your code here..."></textarea>
                </div>
            </div>

            <!-- Console & Test Cases -->
            <div class="console-section">
                <div class="pane-header console-header">
                    <h2><i class="fas fa-terminal"></i> Test Output</h2>
                    <span id="test-status" class="test-status">Awaiting Execution</span>
                </div>
                <div class="console-output" id="console-output">
                    <!-- Test results injected here -->
                    <div class="console-placeholder">Click 'Run Code' to execute your solution against the hidden test cases.</div>
                </div>
            </div>

        </main>
    </div>

    <!-- Global Theme JS -->
    <script src="../global-theme.js"></script>
    <script src="script.js"></script>
</body>
</html>
